name: Build and Release

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          Remove-Item -Recurse -Force "build", "dist", "JiraUSCreator.spec" -ErrorAction SilentlyContinue
          python -m PyInstaller --onefile --noconsole --name "JiraUSCreator" --icon=app.ico main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JiraUSCreator
          path: dist/JiraUSCreator.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/JiraUSCreator.exe
          generate_release_notes: true
